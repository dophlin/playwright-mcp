services:
  openmate-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set before `docker compose build`, e.g. `export GIT_COMMIT_SHA=$(git rev-parse HEAD)`.
        # Dockploy: pass the same as a build argument from the clone SHA (see deploy runbook).
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
    image: openmate/playwright-mcp:local
    container_name: openmate-mcp
    restart: unless-stopped
    ports:
      - "${OPENMATE_PORT:-3100}:3100"
    environment:
      - OPENMATE_API_KEY=${OPENMATE_API_KEY}
      - OPENMATE_PORT=3100
      - OPENMATE_HOST=0.0.0.0
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3100/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
